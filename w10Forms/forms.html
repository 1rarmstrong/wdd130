<!-- Needed stuff to be placed in the main of whatever page I have it on. -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
    <!-- Normally, the following style will be going to a CSS file. This is just for the continuation of the lesson in one file. -->
    <style>
                body {
        /* Center the form on the page */
        text-align: center;
        }

        form {
        display: inline-block;
        /* Form outline */
        padding: 1em;
        border: 1px solid #ccc;
        border-radius: 1em;
        }

        p + p {
        margin-top: 1em;
        }

        label {
        /* Uniform size & alignment */
        display: inline-block;
        min-width: 90px;
        text-align: right;
        }

        input,
        textarea {
        /* To make sure that all text fields have the same font settings
            By default, text areas have a monospace font */
        font: 1em sans-serif;
        /* Uniform text field size */
        width: 300px;
        box-sizing: border-box;
        /* Match form field borders */
        border: 1px solid #999;
        }

        input:focus,
        textarea:focus {
        /* Set the outline width and style */
        outline-style: solid;
        /* To give a little highlight on active elements */
        outline-color: #000;
        }

        textarea {
        /* Align multiline text fields with their labels */
        vertical-align: top;
        /* Provide space to type some text */
        height: 5em;
        }

        .button {
        /* Align buttons with the text fields */
        padding-left: 90px; /* same size as the label elements */
        }

        button {
        /* This extra margin represent roughly the same space as the space
            between the labels and their text fields */
        margin-left: 0.5em;
        }
        #feedback {
            background-color: antiquewhite;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: .5em;
            /* make this element invisible until we are ready for it */
            display: none;      
        }
        .moveDown {
            margin-top: 3em;
        }
    </style>
 </head>
 <body>
        <Main>
            <!-- The # in action just means we want to stay on this page for now. If I wanted a different one, I'd need a relative path. -->
            <div id="feedback"></div>
            <form action="#" method="post">
                <p>
                  <label for="name">Name:</label>
                  <input type="text" id="name" name="user_name" />
                </p>
                <p>
                  <label for="mail">Email:</label>
                  <input type="email" id="mail" name="user_email" />
                </p>
                <p>
                  <label for="msg">Message:</label>
                  <textarea id="msg" name="user_message"></textarea>
                </p>
                <!-- Here's a button -->
                <p class="button">
                    <button type="submit">Send your message</button>
                  </p>
                <input type="text" value="by default this element is filled with this text" />
              </form>
              <form>
                <fieldset>
                  <legend>Fruit juice size</legend>
                  <p>
                    <input type="radio" name="size" id="size_1" value="small" />
                    <label for="size_1">Small</label>
                  </p>
                  <p>
                    <input type="radio" name="size" id="size_2" value="medium" />
                    <label for="size_2">Medium</label>
                  </p>
                  <p>
                    <input type="radio" name="size" id="size_3" value="large" />
                    <label for="size_3">Large</label>
                  </p>
                </fieldset>
              </form>
              <div id="feedback"></div>
              <form>
                <p>
                  <input type="checkbox" id="taste_1" name="taste_cherry" value="cherry" />
                  <label for="taste_1">I like cherry</label>
                </p>
                <p>
                  <input type="checkbox" id="taste_2" name="taste_banana" value="banana" />
                  <label for="taste_2">I like banana</label>
                </p>
              </form>
              <div id="feedback"></div>              
              <section>
                <h2>Payment information</h2>
                <p>
                  <label for="card">
                    <span>Card type:</span>
                  </label>
                  <select id="card" name="user-card">
                    <option value="visa">Visa</option>
                    <option value="mc">Mastercard</option>
                    <option value="amex">American Express</option>
                  </select>
                </p>
                <p>
                  <label for="number">
                    <span>Card number:</span>
                    <strong><span aria-label="required">*</span></strong>
                  </label>
                  <input type="tel" id="number" name="card-number" required />
                </p>
                <p>
                  <label for="expiration">
                    <span>Expiration date:</span>
                    <strong><span aria-label="required">*</span></strong>
                  </label>
                  <input
                    type="text"
                    id="expiration"
                    name="expiration"
                    required
                    placeholder="MM/YY"
                    pattern="^(0[1-9]|1[0-2])\/([0-9]{2})$" />
                </p>
              </section>
              
        </Main>
    <script>
        // get the feedback div element so we can do something with it.
        const feedbackElement = document.getElementById('feedback');
        // get the form so we can read what was entered in it.
        const formElement = document.forms[0];
        // add a 'listener' to wait for a submission of our form. When that happens run the code below.
        formElement.addEventListener('submit', function(e) {
            // stop the form from doing the default action.
            e.preventDefault();
            // set the contents of our feedback element to a message letting the user know the form was submitted successfully. Notice that we pull the name that was entered in the form to personalize the message!
            feedbackElement.innerHTML = 'Hello '+ formElement.user_name.value +'! Thank you for your message. We will get back with you as soon as possible!';
            // make the feedback element visible.
            feedbackElement.style.display = "block";
            // add a class to move everything down so our message doesn't cover it.
            document.body.classList.toggle('moveDown');
        });
    </script>
 </body>
 </html>

 <!-- Security -->
  <!-- Never use the GET method for a form.  -->
   <!-- Never put a form inside of another form (not allowed) -->
